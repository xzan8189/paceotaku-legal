<!doctype html><html lang="it"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apri in PaceOtaku</title><link rel="stylesheet" href="style.css">
<style>
.wrap{max-width:460px;margin:8vh auto;text-align:center}
.badge{width:76px;height:76px;border-radius:20px;background:#2E5FE8;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px}
.btn{display:inline-block;margin:18px 0 8px;padding:14px 26px;border-radius:14px;
  background:#2E5FE8;color:#fff;font-weight:700;text-decoration:none;font-size:16px}
.hint{font-size:13px;color:#8a8a95;margin-top:14px}
.name{font-weight:800;font-size:20px;margin:2px 0 6px}
</style></head><body>
<div class="wrap">
  <div class="badge">📖</div>
  <p class="muted" id="kind">Contenuto su PaceOtaku</p>
  <p class="name" id="name">PaceOtaku</p>
  <a class="btn" id="open" href="#">Apri in PaceOtaku</a>
  <p class="hint" id="hint">Se non si apre, assicurati di avere installato l'app PaceOtaku.</p>
</div>
<script>
(function(){
  // Il link condiviso ha la forma  apri.html?n=<nome>#title/<id>  oppure
  // apri.html?n=<nome>#post/<mediaId>/<cap>/<quoteId>. Ricostruiamo lo schema
  // custom paceotaku:// che l'app sa gestire.
  var frag = (location.hash || '').replace(/^#/, '');
  var params = new URLSearchParams(location.search);
  var name = params.get('n');
  var deep = frag ? ('paceotaku://' + frag) : 'paceotaku://';
  var parts = frag.split('/');
  var kind = parts[0] === 'post' ? 'Un post su PaceOtaku' : 'Un titolo su PaceOtaku';
  document.getElementById('kind').textContent = kind;
  if (name) { document.getElementById('name').textContent = name; }
  else { document.getElementById('name').style.display = 'none'; }
  var a = document.getElementById('open');
  a.setAttribute('href', deep);
  // Tenta l'apertura automatica dell'app all'arrivo sulla pagina.
  if (frag) { try { window.location.href = deep; } catch(e){} }
})();
</script>
</body></html>
